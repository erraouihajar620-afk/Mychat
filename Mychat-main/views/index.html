<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mychat made by hajar erraoui</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-container">
    <!-- Auth Container -->
    <div id="auth-container" class="auth-container">
      <div class="auth-box">
        <div class="logo-container">
          <img src="/images/logo_medchat-r.png" alt="Logo mychat made by hajar erraoui" class="app-logo">
          <h1>Mychat</h1>
        </div>
        <div class="auth-tabs">
          <button id="login-tab" class="auth-tab active">Login</button>
          <button id="register-tab" class="auth-tab">Register</button>
        </div>
        
        <!-- Login Form -->
        <form id="login-form" class="auth-form active">
          <div class="form-group">
            <label for="login-username">Username</label>
            <input type="text" id="login-username" required>
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" required>
          </div>
          <button type="submit" class="btn btn-primary">Login</button>
          <p id="login-error" class="error-message"></p>
        </form>
        
        <!-- Register Form -->
        <form id="register-form" class="auth-form">
          <div class="form-group">
            <label for="register-username">Username</label>
            <input type="text" id="register-username" required>
          </div>
          <div class="form-group">
            <label for="register-email">Email</label>
            <input type="email" id="register-email" required>
          </div>
          <div class="form-group">
            <label for="register-password">Password</label>
            <input type="password" id="register-password" required>
          </div>
          <button type="submit" class="btn btn-primary">Register</button>
          <p id="register-error" class="error-message"></p>
        </form>
      </div>
    </div>
    
    <!-- Chat Container (Hidden until logged in) -->
    <div id="chat-container" class="chat-container hidden">
      <div class="sidebar">
        <div class="sidebar-header">
          <div class="header-logo">
            <img src="/images/logo_medchat-r.png" alt="Logo mychat made by hajar erraoui" class="app-logo">
            <h2>Mychat</h2>
          </div>
          <div class="user-info">
            <span id="username-display"></span>
            <button id="logout-btn" class="btn-icon">
              <i class="fas fa-sign-out-alt"></i>
            </button>
          </div>
        </div>
        
        <div class="sidebar-content">
          <div class="rooms-section">
            <div class="rooms-header">
              <h3>Rooms</h3>
              <button id="create-room-btn" class="btn-icon">
                <i class="fas fa-plus"></i>
              </button>
            </div>
            <div id="rooms-list" class="rooms-list">
              <!-- Rooms will be added here dynamically -->
            </div>
          </div>
          
          <div class="notifications-section">
            <h3>Notifications <span id="notification-count" class="notification-badge hidden">0</span></h3>
            <div id="notifications-list" class="notifications-list">
              <!-- Notifications will be added here dynamically -->
            </div>
          </div>
        </div>
      </div>
      
      <div class="chat-main">
        <div id="welcome-message" class="welcome-message">
          <h2>Welcome to Mychat</h2>
          <p>Select a room to start chatting</p>
        </div>
        
        <div id="active-chat" class="active-chat hidden">
          <div class="chat-header">
            <h2 id="active-room-name"></h2>
            <p id="active-room-description"></p>
          </div>
          
          <div id="messages-container" class="messages-container">
            <!-- Messages will be added here dynamically -->
          </div>
          
          <div class="message-compose">
            <input type="text" id="message-input" placeholder="Type your message...">
            <div class="message-actions">
              <button id="send-message-btn" class="btn btn-primary">
                <i class="fas fa-paper-plane"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Create Room Modal -->
    <div id="create-room-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Create a new room</h2>
          <button id="close-modal-btn" class="btn-icon">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <form id="create-room-form">
          <div class="form-group">
            <label for="room-name">Room name</label>
            <input type="text" id="room-name" required>
          </div>
          <div class="form-group">
            <label for="room-description">Description</label>
            <textarea id="room-description" required></textarea>
          </div>
          <div class="form-group">
            <label for="room-category">Category</label>
            <select id="room-category" required>
              <option value="">Select a category</option>
              <option value="Maths">Mathematics</option>
              <option value="Informatique">Computer Science</option>
              <option value="Physique">Physics</option>
              <option value="Chimie">Chemistry</option>
              <option value="Biologie">Biology</option>
              <option value="Langues">Languages</option>
              <option value="Histoire">History</option>
              <option value="Géographie">Geography</option>
              <option value="Philosophie">Philosophy</option>
              <option value="Autre">Other</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary">Create room</button>
        </form>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/rooms.js"></script>
  <script src="/js/chat.js"></script>
  <script src="/js/app.js"></script>
</body>
 <f!-- FOOTER HTML -->
<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-logo">
      <span class="footer-brand">mychat</span>
    </div>
    <p class="footer-copy">
      &copy; 2026 <strong>Mychat</strong> &mdash; crafted with ♡ by <span class="footer-author">Hajar</span>
    </p>
    <p class="footer-rights">All rights reserved.</p>
  </div>
</footer>
</html>
